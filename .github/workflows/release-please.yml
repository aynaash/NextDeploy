name: Release Please

# Primary, automated release path. On every push to main, release-please reads
# the Conventional Commits since the last release and maintains a single
# "release PR" that previews the next semantic version and the CHANGELOG.
# Merging that PR creates the git tag + GitHub Release, and the gated `release`
# job below then builds and attaches the binaries with GoReleaser.
#
# Why versions stop being chaotic: the bump level is derived from commit types
# (feat -> minor, fix -> patch, feat!/BREAKING CHANGE -> minor while 0.x), so no
# one hand-picks numbers and none get skipped.
#
# The legacy tag-triggered release.yml stays as a manual escape hatch. Tags
# created here use GITHUB_TOKEN, which by design does NOT trigger other
# workflows, so release.yml never double-fires for a release-please release.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  GO_VERSION: "1.25.x"

jobs:
  release-please:
    name: Compute version & changelog
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release:
    name: Build & Release
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Verify modules
        run: go mod verify

      - name: Test
        run: go test -race -timeout 5m ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --timeout 60m
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release assets
        run: |
          echo "🔍 Release assets:"
          ls -lh dist/*.tar.gz dist/*.zip 2>/dev/null || true
          echo ""
          echo "📋 Checksums:"
          cat dist/*_checksums.txt 2>/dev/null || echo "No checksums found"
