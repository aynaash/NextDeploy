# nextdeploy prepare playbook
# Provisions a fresh Linux server with everything NextDeploy needs:
#   Node.js      (webi latest → webi@18 → unofficial glibc-217 build)
#   Bun          (official installer, symlinked to /usr/local/bin)
#   Go           (auto-fetches latest stable from go.dev, falls back to go_version_fallback)
#   Caddy        (apt repo OR yum COPR → static binary fallback)
#   Doppler CLI
#   nextdeployd  (GitHub release binary → go install fallback)
#   /opt/nextdeploy directory tree
#
# Security Features:
#   - Unix socket at /var/run/nextdeployd.sock with restrictive permissions
#   - Dedicated nextdeploy user/group for service isolation
#   - Systemd sandboxing (ProtectSystem=strict, NoNewPrivileges=yes, etc.)
#   - Socket ownership root:nextdeploy with mode 0660

- name: NextDeploy – Prepare server
  hosts: target
  gather_facts: false
  become: false

  vars:
    node22_version: "22.22.0" # used only for the glibc-217 tier-3 Node fallback
    go_version_fallback: "1.25.7" # used only if go.dev/VERSION cannot be fetched
    app_root: /opt/nextdeploy
    app_dir: /opt/nextdeploy/apps
    caddy_fallback_version: "2.8.4" # used only if GitHub API is unreachable
    # Socket lives inside the RuntimeDirectory that systemd creates and owns.
    # This allows ProtectSystem=strict without needing extra ReadWritePaths.
    socket_path: /run/nextdeployd/nextdeployd.sock
    socket_dir: /run/nextdeployd

  # ────────────────────────────────────────────────────────────────────────────
  # PHASE 1 – System bootstrap & info
  # ────────────────────────────────────────────────────────────────────────────
  tasks:
    - name: "Phase 1 | Optimize | Targeted fact gathering"
      ansible.builtin.setup:
        filter:
          - ansible_pkg_mgr
          - ansible_user_id
          - ansible_distribution
          - ansible_architecture
      become: false

    - name: "Phase 1 | Security | Create nextdeploy group"
      ansible.builtin.group:
        name: nextdeploy
        state: present
        system: true
      become: true

    - name: "Phase 1 | Security | Create nextdeploy user"
      ansible.builtin.user:
        name: nextdeploy
        group: nextdeploy
        shell: /sbin/nologin
        system: true
        create_home: false
        state: present
      become: true
    - name: "Phase 1 | Security | Add current user to nextdeploy group"
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups: nextdeploy
        append: true
      become: true

    - name: "Phase 1 | Security | Add caddy user to nextdeploy group"
      ansible.builtin.user:
        name: caddy
        groups: nextdeploy
        append: true
      become: true
      ignore_errors: true # Caddy might not be installed yet, will retry later

    - name: "Phase 1 | System info | Gather all required info in one RTT"
      ansible.builtin.shell: |
        echo "uname  : $(uname -a)"
        echo "disk   : $(df -h / | awk 'NR==2')"
        echo "memory : $(free -m | awk 'NR==2')"
        echo "uptime : $(uptime)"
        echo "node   : $(node --version 2>/dev/null || echo 'missing')"
        echo "go     : $(go version 2>/dev/null || echo 'missing')"
        echo "bun    : $(bun --version 2>/dev/null || echo 'missing')"
        echo "doppler: $(doppler --version 2>/dev/null || echo 'missing')"
      register: sysinfo
      changed_when: false

    - name: "Phase 1 | Print system summary"
      ansible.builtin.debug:
        msg: "{{ sysinfo.stdout_lines }}"

    # ────────────────────────────────────────────────────────────────────────────
    # PHASE 2 – Base packages
    # ────────────────────────────────────────────────────────────────────────────

    # ── apt ──────────────────────────────────────────────────────────────────

    - name: "Phase 2 | apt | Update cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      become: true
      when: ansible_pkg_mgr == "apt"

    - name: "Phase 2 | apt | Install base packages"
      ansible.builtin.apt:
        name:
          - curl
          - git
          - make
          - gcc
          - build-essential
          - ca-certificates
          - unzip
          - file
          - acl # for permission management
        state: present
      become: true
      when: ansible_pkg_mgr == "apt"

    # ── yum ──────────────────────────────────────────────────────────────────

    - name: "Phase 2 | yum | Clean cache"
      ansible.builtin.command: yum clean all -q
      become: true
      changed_when: false
      when: ansible_pkg_mgr == "yum"

    - name: "Phase 2 | yum | Install base packages"
      ansible.builtin.yum:
        name:
          - curl
          - git
          - make
          - gcc
          - glibc-static
          - ca-certificates
          - yum-utils
          - unzip
          - file
          - acl
        state: present
      become: true
      when: ansible_pkg_mgr == "yum"

    # ────────────────────────────────────────────────────────────────────────────
    # PHASE 2 – Node.js  (3-tier glibc fallback)
    # ────────────────────────────────────────────────────────────────────────────

    - name: "Phase 2 | Node.js | check pre-existence"
      ansible.builtin.set_fact:
        node_installed: "{{ 'missing' not in (sysinfo.stdout_lines | select('match', '^node.*') | first | default('missing')) }}"

    - name: "Phase 2 | Node.js | Tier-1: install via webi latest"
      ansible.builtin.shell: |
        set -euo pipefail
        curl -fsSL https://webi.sh/node | sh
        NODE_DIR="${HOME}/.local/opt/node/bin"
        for BIN in node npm npx; do
          [ -f "${NODE_DIR}/${BIN}" ] && sudo ln -sf "${NODE_DIR}/${BIN}" "/usr/local/bin/${BIN}" || true
        done
      args:
        executable: /bin/bash
      when: not node_installed

    - name: "Phase 2 | Node.js | Re-check after webi latest"
      ansible.builtin.shell: >
        env -i PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        node --version
      register: node_after_latest
      failed_when: false
      changed_when: false
      when: not node_installed

    - name: "Phase 2 | Node.js | Tier-2: install via webi@18"
      ansible.builtin.shell: |
        set -euo pipefail
        curl -fsSL https://webi.sh/node@18 | sh
        NODE_DIR="${HOME}/.local/opt/node/bin"
        for BIN in node npm npx; do
          [ -f "${NODE_DIR}/${BIN}" ] && sudo ln -sf "${NODE_DIR}/${BIN}" "/usr/local/bin/${BIN}" || true
        done
      args:
        executable: /bin/bash
      when:
        - not node_installed
        - node_after_latest is defined
        - node_after_latest.rc != 0

    - name: "Phase 2 | Node.js | Re-check after webi@18"
      ansible.builtin.shell: >
        env -i PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        node --version
      register: node_after_18
      failed_when: false
      changed_when: false
      when:
        - not node_installed
        - node_after_latest is defined
        - node_after_latest.rc != 0

    # Tier 3 – unofficial glibc-217 build (glibc 2.17+, covers Amazon Linux 2)
    - name: "Phase 2 | Node.js | Tier-3: install glibc-217 build (ultimate fallback)"
      ansible.builtin.shell: |
        set -euo pipefail
        sudo mkdir -p /opt/node22
        curl -fsSL --retry 3 --retry-delay 2 \
          "https://unofficial-builds.nodejs.org/download/release/v{{ node22_version }}/node-v{{ node22_version }}-linux-x64-glibc-217.tar.gz" \
          | sudo tar -xzf - -C /opt/node22 --strip-components=1
        for BIN in node npm npx; do
          sudo ln -sf "/opt/node22/bin/${BIN}" "/usr/local/bin/${BIN}"
        done
      args:
        executable: /bin/bash
      when:
        - not node_installed
        - node_after_latest is defined
        - node_after_latest.rc != 0
        - node_after_18 is defined
        - node_after_18.rc != 0

    - name: "Phase 2 | Node.js | Final functional check"
      ansible.builtin.shell: >
        env -i PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        node --version
      register: node_final
      changed_when: false

    - name: "Phase 2 | Node.js | Assert runnable"
      ansible.builtin.assert:
        that: node_final.rc == 0
        fail_msg: >-
          node is not runnable after all three install tiers.
          glibc on this host may be older than 2.17 — manual intervention required.
      when: not node_installed

    # ────────────────────────────────────────────────────────────────────────────
    # PHASE 2 – Bun
    # ────────────────────────────────────────────────────────────────────────────

    - name: "Phase 2 | Bun | check pre-existence"
      ansible.builtin.set_fact:
        bun_installed: "{{ 'missing' not in (sysinfo.stdout_lines | select('match', '^bun.*') | first | default('missing')) }}"

    - name: "Phase 2 | Bun | Install via official installer"
      ansible.builtin.shell: |
        set -euo pipefail

        # bun installer requires unzip — installed in base packages but double-check
        if command -v apt-get >/dev/null 2>&1; then
          sudo apt-get install -y unzip >/dev/null 2>&1 || true
        elif command -v yum >/dev/null 2>&1; then
          sudo yum install -y unzip >/dev/null 2>&1 || true
        fi

        curl -fsSL https://bun.sh/install | bash

        # Symlink into /usr/local/bin from all known landing spots
        LINKED=false
        for BUN_BIN in \
            "${HOME}/.bun/bin/bun" \
            "${HOME}/.local/bin/bun" \
            "${HOME}/.local/opt/bun/bin/bun"; do
          if [ -x "${BUN_BIN}" ]; then
            sudo install -m 0755 "${BUN_BIN}" /usr/local/bin/bun
            echo "Installed bun globally from ${BUN_BIN}"
            LINKED=true
            break
          fi
        done

        if [ "${LINKED}" = "false" ]; then
          echo "ERROR: bun binary not found in any expected location after install" >&2
          echo "Searched: ~/.bun/bin/bun  ~/.local/bin/bun  ~/.local/opt/bun/bin/bun" >&2
          exit 1
        fi
      args:
        executable: /bin/bash
        # Idempotency guard: skip the curl|bash install entirely if the binary
        # is already in place, independent of the PATH-based fact above.
        creates: /usr/local/bin/bun
      when: not bun_installed

    - name: "Phase 2 | Bun | Verify symlink is executable"
      ansible.builtin.stat:
        path: /usr/local/bin/bun
      register: bun_stat_post

    - name: "Phase 2 | Bun | Assert installed and executable"
      ansible.builtin.assert:
        that:
          - bun_stat_post.stat.exists
          - bun_stat_post.stat.executable
        fail_msg: >-
          /usr/local/bin/bun does not exist or is not executable after install.
          Check that bun.sh installer succeeded and that one of
          ~/.bun/bin/bun | ~/.local/bin/bun | ~/.local/opt/bun/bin/bun was created.

    # ────────────────────────────────────────────────────────────────────────────
    # PHASE 2 – Go  (auto-resolves latest stable; falls back to go_version_fallback)
    # ────────────────────────────────────────────────────────────────────────────

    - name: "Phase 2 | Go | check pre-existence"
      ansible.builtin.set_fact:
        go_installed: "{{ 'missing' not in (sysinfo.stdout_lines | select('match', '^go.*') | first | default('missing')) }}"

    - name: "Phase 2 | Go | Resolve latest stable version from go.dev"
      ansible.builtin.shell: |
        set -euo pipefail
        # go.dev/VERSION returns the canonical latest stable string e.g. "go1.25.7"
        VER=$(curl -fsSL --retry 3 --retry-delay 2 https://go.dev/VERSION?m=text 2>/dev/null \
              | head -1 \
              | sed 's/^go//')
        if echo "${VER}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "${VER}"
        else
          echo "{{ go_version_fallback }}"
        fi
      args:
        executable: /bin/bash
      register: go_resolved_version
      changed_when: false
      when: not go_installed

    - name: "Phase 2 | Go | Install go{{ go_resolved_version.stdout | default(go_version_fallback) | trim }}"
      ansible.builtin.shell: |
        set -euo pipefail
        GO_VERSION="{{ go_resolved_version.stdout | default(go_version_fallback) | trim }}"
        ARCH="{{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
        TARBALL="/tmp/go.tar.gz"

        echo "Installing Go ${GO_VERSION} (${ARCH})..."
        curl -fsSL --retry 3 --retry-delay 2 \
          "https://go.dev/dl/go${GO_VERSION}.linux-${ARCH}.tar.gz" \
          -o "${TARBALL}"

        if ! tar -tzf "${TARBALL}" >/dev/null 2>&1; then
          echo "ERROR: Go tarball is corrupt or invalid (version=${GO_VERSION}, arch=${ARCH})" >&2
          rm -f "${TARBALL}"
          exit 1
        fi

        sudo rm -rf /usr/local/go
        sudo tar -C /usr/local -xzf "${TARBALL}"
        rm -f "${TARBALL}"

        sudo ln -sf /usr/local/go/bin/go    /usr/local/bin/go
        sudo ln -sf /usr/local/go/bin/gofmt /usr/local/bin/gofmt
      args:
        executable: /bin/bash
        # Idempotency guard: skip re-download/extract if go is already installed.
        creates: /usr/local/bin/go
      become: true
      when: not go_installed

    - name: "Phase 2 | Go | Final check"
      ansible.builtin.shell: >
        env -i PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        go version
      register: go_final
      changed_when: false

    - name: "Phase 2 | Go | Assert installed"
      ansible.builtin.assert:
        that: "'go version' in go_final.stdout"
        fail_msg: >-
          go installation failed — 'go version' not found in PATH.
          Attempted version: {{ go_resolved_version.stdout | default(go_version_fallback) | trim }}
      when: not go_installed

    # ────────────────────────────────────────────────────────────────────────────
    # PHASE 2 – Doppler CLI
    # ────────────────────────────────────────────────────────────────────────────

    - name: "Phase 2 | Doppler | check pre-existence"
      ansible.builtin.set_fact:
        doppler_installed: "{{ 'missing' not in (sysinfo.stdout_lines | select('match', '^doppler.*') | first | default('missing')) }}"

    - name: "Phase 2 | Doppler | Install CLI"
      ansible.builtin.shell: |
        set -euo pipefail
        if command -v curl >/dev/null 2>&1; then
          curl -fsSL --tlsv1.2 --proto "=https" --retry 3 \
            https://cli.doppler.com/install.sh | sudo sh
        elif command -v wget >/dev/null 2>&1; then
          wget -t 3 -qO- https://cli.doppler.com/install.sh | sudo sh
        else
          echo "ERROR: neither curl nor wget available — cannot install Doppler" >&2
          exit 1
        fi
      args:
        executable: /bin/bash
        # Idempotency guard: skip the install script if doppler is already present.
        creates: /usr/local/bin/doppler
      when: not doppler_installed

    - name: "Phase 2 | Doppler | Assert installed"
      ansible.builtin.shell: >
        env -i PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        sh -c 'command -v doppler'
      register: doppler_which
      changed_when: false
      failed_when: doppler_which.rc != 0

    # ────────────────────────────────────────────────────────────────────────────
    # PHASE 2 – Caddy
    # ────────────────────────────────────────────────────────────────────────────

    - name: "Phase 2 | Caddy | check pre-existence"
      ansible.builtin.set_fact:
        caddy_installed: "{{ 'missing' not in (sysinfo.stdout_lines | select('match', '^caddy.*') | first | default('missing')) }}"

    - name: "Phase 2 | Caddy | Prepare install logic"
      ansible.builtin.set_fact:
        install_caddy: "{{ not caddy_installed }}"

    - name: "Phase 2 | Caddy | Check for Coraza WAF module"
      ansible.builtin.shell: "caddy list-modules | grep -q coraza_waf"
      register: caddy_has_coraza
      changed_when: false
      failed_when: false
      when: caddy_installed

    - name: "Phase 2 | Caddy | Force rebuild if Coraza missing"
      ansible.builtin.set_fact:
        install_caddy: true
      when:
        - caddy_installed
        - caddy_has_coraza.rc != 0

    # ── apt path ─────────────────────────────────────────────────────────────

    - name: "Phase 2 | Caddy (apt) | Install transport prerequisites"
      ansible.builtin.apt:
        name:
          - debian-keyring
          - debian-archive-keyring
          - apt-transport-https
        state: present
      become: true
      when:
        - ansible_pkg_mgr == "apt"
        - install_caddy

    - name: "Phase 2 | Caddy (apt) | Add GPG key"
      ansible.builtin.shell: |
        set -euo pipefail
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' \
          | sudo gpg --batch --yes --dearmor \
              -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/xcaddy/gpg.key' \
          | sudo gpg --batch --yes --dearmor \
              -o /usr/share/keyrings/caddy-xcaddy-archive-keyring.gpg
      args:
        executable: /bin/bash
      become: true
      when:
        - ansible_pkg_mgr == "apt"
        - install_caddy

    - name: "Phase 2 | Caddy (apt) | Add repository"
      ansible.builtin.shell: |
        set -euo pipefail
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' \
          | sudo tee /etc/apt/sources.list.d/caddy-stable.list
        curl -1sLf 'https://dl.cloudsmith.io/public/caddy/xcaddy/debian.deb.txt' \
          | sudo tee /etc/apt/sources.list.d/caddy-xcaddy.list
      args:
        executable: /bin/bash
      become: true
      when:
        - ansible_pkg_mgr == "apt"
        - install_caddy

    - name: "Phase 2 | Caddy (apt) | Install package"
      ansible.builtin.apt:
        name:
          - caddy
          - xcaddy
        update_cache: true
        state: present
      become: true
      when:
        - ansible_pkg_mgr == "apt"
        - install_caddy

    - name: "Phase 2 | Caddy (apt) | Build custom Caddy with Coraza WAF"
      ansible.builtin.shell: |
        set -euo pipefail
        xcaddy build --with github.com/corazawaf/coraza-caddy/v2
        sudo mv caddy /usr/bin/caddy
      args:
        executable: /bin/bash
      become: true
      when:
        - ansible_pkg_mgr == "apt"
        - install_caddy

    - name: "Phase 2 | Caddy (apt) | Enable and start service"
      ansible.builtin.systemd:
        name: caddy
        enabled: true
        state: started
        daemon_reload: true
      become: true
      when: ansible_pkg_mgr == "apt"

    # ── yum path ─────────────────────────────────────────────────────────────

    - name: "Phase 2 | Caddy (yum) | Install yum-plugin-copr"
      ansible.builtin.yum:
        name: yum-plugin-copr
        state: present
      become: true
      ignore_errors: true
      register: copr_plugin
      when:
        - ansible_pkg_mgr == "yum"
        - install_caddy

    - name: "Phase 2 | Caddy (yum) | Enable COPR repo"
      ansible.builtin.command: yum copr enable -y @caddy/caddy
      become: true
      ignore_errors: true
      register: copr_enable
      changed_when: "'enabled' in (copr_enable.stdout | default(''))"
      when:
        - ansible_pkg_mgr == "yum"
        - install_caddy
        - copr_plugin is not failed

    - name: "Phase 2 | Caddy (yum) | Install via COPR"
      ansible.builtin.yum:
        name: caddy
        state: present
      become: true
      ignore_errors: true
      register: caddy_copr
      when:
        - ansible_pkg_mgr == "yum"
        - install_caddy
        - copr_enable is not failed

    - name: "Phase 2 | Caddy (yum) | Static binary fallback"
      ansible.builtin.shell: |
        set -euo pipefail
        CADDY_VERSION=$(curl -fsSL --retry 3 --retry-delay 2 \
          https://api.github.com/repos/caddyserver/caddy/releases/latest 2>/dev/null \
          | grep '"tag_name"' | head -1 | sed 's/.*"v\([^"]*\)".*/\1/')
        [ -z "${CADDY_VERSION}" ] && CADDY_VERSION="{{ caddy_fallback_version }}"
        echo "Installing Caddy ${CADDY_VERSION} (static binary)"

        curl -fsSL --retry 3 --retry-delay 2 \
          "https://github.com/caddyserver/caddy/releases/download/v${CADDY_VERSION}/caddy_${CADDY_VERSION}_linux_amd64.tar.gz" \
          -o /tmp/caddy.tar.gz

        if ! tar -tzf /tmp/caddy.tar.gz >/dev/null 2>&1; then
          echo "ERROR: Caddy tarball is corrupt or invalid" >&2
          rm -f /tmp/caddy.tar.gz
          exit 1
        fi

        tar -xzf /tmp/caddy.tar.gz --no-same-owner -C /tmp caddy
        install -m 0755 /tmp/caddy /usr/local/bin/caddy
        rm -f /tmp/caddy.tar.gz /tmp/caddy
      args:
        executable: /bin/bash
      become: true
      when:
        - ansible_pkg_mgr == "yum"
        - install_caddy
        - caddy_copr is failed or caddy_copr is skipped

    - name: "Phase 2 | Caddy (yum) | Write systemd unit"
      ansible.builtin.copy:
        dest: /etc/systemd/system/caddy.service
        mode: "0644"
        content: |
          [Unit]
          Description=Caddy web server
          Documentation=https://caddyserver.com/docs/
          After=network.target network-online.target
          Requires=network-online.target

          [Service]
          User=root
          ExecStart=/usr/local/bin/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
          ExecReload=/usr/local/bin/caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
          TimeoutStopSec=5s
          Restart=on-failure
          RestartSec=5s
          LimitNOFILE=1048576

          [Install]
          WantedBy=multi-user.target
      become: true
      when:
        - ansible_pkg_mgr == "yum"
        - install_caddy

    - name: "Phase 2 | Caddy | Ensure config directory exists"
      ansible.builtin.file:
        path: /etc/caddy/nextdeploy.d
        state: directory
        owner: root
        group: root
        mode: "0750"
      become: true

    - name: "Phase 2 | Caddy | Initialize secure default Caddyfile"
      ansible.builtin.copy:
        dest: /etc/caddy/Caddyfile
        content: |
          {
          	order coraza_waf first
          }

          import /etc/caddy/nextdeploy.d/*.caddy
        mode: "0644"
        force: true
      become: true

    - name: "Phase 2 | Caddy | Reload daemon, enable and start"
      ansible.builtin.systemd:
        name: caddy
        daemon_reload: true
        enabled: true
        state: started
      become: true

    # ── final check ───────────────────────────────────────────────────────────

    - name: "Phase 2 | Caddy | Final presence check"
      ansible.builtin.shell: >
        env -i PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        sh -c 'command -v caddy'
      register: caddy_final
      changed_when: false
      failed_when: caddy_final.rc != 0

    - name: "Phase 2 | Caddy | Assert service active"
      ansible.builtin.systemd:
        name: caddy
      register: caddy_service
      become: true
      failed_when: caddy_service.status.ActiveState not in ['active', 'activating']

    # ────────────────────────────────────────────────────────────────────────────
    # PHASE 3 – nextdeployd daemon (with secure socket configuration)
    # ────────────────────────────────────────────────────────────────────────────

    - name: "Phase 3 | Daemon | Record pre-install version"
      ansible.builtin.shell: >
        env -i PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        nextdeployd --version 2>/dev/null || echo "not installed"
      register: daemon_version_before
      changed_when: false
      failed_when: false

    - name: "Phase 3 | Daemon | Fetch latest GitHub release tag"
      ansible.builtin.shell: |
        set -euo pipefail
        curl -fsSL --retry 3 --retry-delay 2 \
          https://api.github.com/repos/aynaash/nextdeploy/releases/latest \
          | grep '"tag_name"' | head -1 \
          | sed 's/.*"tag_name": *"\([^"]*\)".*/\1/'
      args:
        executable: /bin/bash
      register: latest_tag
      changed_when: false
      failed_when: false

    - name: "Phase 3 | Daemon | Download pre-built binary"
      ansible.builtin.shell: |
        set -euo pipefail
        TAG="{{ latest_tag.stdout | trim }}"
        ARCH="{{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
        URL="https://github.com/aynaash/nextdeploy/releases/download/${TAG}/nextdeployd-linux-${ARCH}"

        echo "Downloading nextdeployd ${TAG} for linux/${ARCH}..."
        curl -fsSL --retry 3 --retry-delay 2 "${URL}" -o /tmp/nextdeployd

        # Confirm ELF binary — not an HTML 404 page
        if ! file /tmp/nextdeployd 2>/dev/null | grep -qi 'ELF'; then
          echo "ERROR: downloaded file is not an ELF binary" >&2
          echo "       URL: ${URL}" >&2
          echo "       file output: $(file /tmp/nextdeployd 2>&1)" >&2
          rm -f /tmp/nextdeployd
          exit 1
        fi

        sudo install -m 0755 /tmp/nextdeployd /usr/local/bin/nextdeployd
        rm -f /tmp/nextdeployd
        echo "Installed nextdeployd ${TAG}"
      args:
        executable: /bin/bash
      register: daemon_binary_install
      when: "(latest_tag.stdout | trim) != ''"
      failed_when: false # non-zero falls through to go install

    - name: "Phase 3 | Daemon | Fallback: build from source via go install"
      ansible.builtin.shell: |
        set -euo pipefail
        export GOPATH="${HOME}/go"
        export PATH="${GOPATH}/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
        echo "Building nextdeployd from source (go install)..."
        go install github.com/aynaash/nextdeploy/daemon/cmd/nextdeployd@latest
        sudo install -m 0755 "${GOPATH}/bin/nextdeployd" /usr/local/bin/nextdeployd
      args:
        executable: /bin/bash
      when: >-
        (latest_tag.stdout | trim) == '' or
        (daemon_binary_install is defined and daemon_binary_install.rc is defined and daemon_binary_install.rc != 0)

    - name: "Phase 3 | Daemon | Assert binary present and executable"
      ansible.builtin.stat:
        path: /usr/local/bin/nextdeployd
      register: daemon_stat
      failed_when: not daemon_stat.stat.exists or not daemon_stat.stat.executable

    - name: "Phase 3 | Daemon | Record post-install version"
      ansible.builtin.shell: >
        env -i PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        nextdeployd --version 2>/dev/null || echo "unknown"
      register: daemon_version_after
      changed_when: false
      failed_when: false

    - name: "Phase 3 | Daemon | Show version delta"
      ansible.builtin.debug:
        msg: "nextdeployd: {{ daemon_version_before.stdout | trim }} → {{ daemon_version_after.stdout | trim }}"

    - name: "Phase 3 | Daemon | Ensure config directory exists"
      ansible.builtin.file:
        path: /etc/nextdeployd
        state: directory
        owner: root
        group: root
        mode: "0750"
      become: true

    - name: "Phase 3 | Daemon | Check for existing daemon config"
      ansible.builtin.stat:
        path: /etc/nextdeployd/config.json
      register: daemon_config_stat
      become: true

    - name: "Phase 3 | Daemon | Generate HMAC security secret"
      ansible.builtin.command: openssl rand -hex 32
      register: daemon_secret
      changed_when: false
      when: not daemon_config_stat.stat.exists

    # Provision a random HMAC secret so the daemon is authenticated from first
    # boot. The daemon also self-generates one on startup if this is absent, but
    # writing it here closes the startup window and keeps it root-only (0600):
    # only root can read the secret, so only root can sign daemon commands even
    # though the socket itself is group-accessible.
    - name: "Phase 3 | Daemon | Write daemon config with security secret"
      ansible.builtin.copy:
        dest: /etc/nextdeployd/config.json
        owner: root
        group: root
        mode: "0600"
        content: |
          {
            "security_secret": "{{ daemon_secret.stdout | trim }}"
          }
      become: true
      when: not daemon_config_stat.stat.exists

    - name: "Phase 3 | Daemon | Write systemd service unit with socket configuration"
      ansible.builtin.copy:
        dest: /etc/systemd/system/nextdeployd.service
        mode: "0644"
        force: true
        content: |
          [Unit]
          Description=NextDeploy Daemon
          Documentation=https://nextdeploy.org/docs
          After=network.target caddy.service
          Wants=caddy.service

          [Service]
          Type=simple
          User=root
          ExecStart=/usr/local/bin/nextdeployd --foreground=true
          Restart=on-failure
          RestartSec=5s
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=nextdeployd

          # systemd creates /run/nextdeployd/ (socket) and /var/log/nextdeployd/
          # (logs) before the service starts and removes them on stop.
          RuntimeDirectory=nextdeployd
          RuntimeDirectoryMode=0755
          RuntimeDirectoryGroup=nextdeploy
          LogsDirectory=nextdeployd
          LogsDirectoryMode=0755
          LogsDirectoryGroup=nextdeploy

          # Minimal sandboxing: the daemon writes to /etc/caddy, /opt/nextdeploy,
          # /run/nextdeployd, and /var/log/nextdeploy — broad access is needed.
          NoNewPrivileges=yes
          CapabilityBoundingSet=CAP_DAC_OVERRIDE CAP_NET_BIND_SERVICE CAP_CHOWN CAP_FOWNER

          [Install]
          WantedBy=multi-user.target
      become: true

    - name: "Phase 3 | Daemon | Reload systemd, enable and restart"
      ansible.builtin.systemd:
        name: nextdeployd
        daemon_reload: true
        enabled: true
        state: restarted
      become: true

    - name: "Phase 3 | Daemon | Wait for socket to be created"
      ansible.builtin.wait_for:
        path: "{{ socket_path }}"
        state: present
        timeout: 30
      become: true
      register: socket_check

    - name: "Phase 3 | Daemon | Set secure socket permissions"
      ansible.builtin.file:
        path: "{{ socket_path }}"
        owner: root
        group: nextdeploy
        mode: "0660" # rw-rw---- : root and nextdeploy group can read/write
      become: true
      when: socket_check is success

    - name: "Phase 3 | Daemon | Verify socket ownership and permissions"
      ansible.builtin.stat:
        path: "{{ socket_path }}"
      register: socket_stat
      become: true
      failed_when: >
        not socket_stat.stat.exists or
        socket_stat.stat.pw_name != 'root' or
        socket_stat.stat.gr_name != 'nextdeploy' or
        socket_stat.stat.mode != '0660'

    - name: "Phase 3 | Daemon | Confirm service is active"
      ansible.builtin.systemd:
        name: nextdeployd
      register: daemon_service
      become: true
      failed_when: daemon_service.status.ActiveState not in ['active', 'activating']

    # ────────────────────────────────────────────────────────────────────────────
    # PHASE 4 – App directories
    # ────────────────────────────────────────────────────────────────────────────

    - name: "Phase 4 | Create app directory tree"
      become: true
      loop:
        - { path: "{{ app_root }}", mode: "0775" }
        - { path: "{{ app_dir }}", mode: "0775" }
        - { path: "{{ app_root }}/uploads", mode: "0775" }
        - { path: "{{ app_root }}/tmp", mode: "0775" }
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: nextdeploy
        group: nextdeploy
        mode: "{{ item.mode }}"

    # ────────────────────────────────────────────────────────────────────────────
    # PHASE 5 – Fail2Ban & Security Hardening
    # ────────────────────────────────────────────────────────────────────────────

    - name: "Phase 5 | Fail2Ban | Install Fail2Ban"
      ansible.builtin.apt:
        name: fail2ban
        state: present
      become: true
      when: ansible_pkg_mgr == "apt"

    - name: "Phase 5 | Caddy | Create log directory"
      ansible.builtin.file:
        path: /var/log/caddy
        state: directory
        owner: caddy
        group: caddy
        mode: "0755"
      become: true

    - name: "Phase 5 | Caddy | Ensure access.log exists with correct permissions"
      ansible.builtin.file:
        path: /var/log/caddy/access.log
        state: touch
        owner: caddy
        group: caddy
        mode: "0644"
      become: true

    - name: "Phase 5 | Fail2Ban | Create Caddy filter"
      ansible.builtin.copy:
        dest: /etc/fail2ban/filter.d/caddy-auth.conf
        content: |
          [Definition]
          failregex = ^.*"remote_ip":"<HOST>".*"status":401.*$
                      ^.*"remote_ip":"<HOST>".*"status":403.*$
          ignoreregex =
        mode: "0644"
      become: true

    - name: "Phase 5 | Fail2Ban | Create Caddy jail"
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.d/caddy.conf
        content: |
          [caddy]
          enabled = true
          port = http,https
          filter = caddy-auth
          logpath = /var/log/caddy/access.log
          maxretry = 5
          bantime = 3600
        mode: "0644"
      become: true

    - name: "Phase 5 | Fail2Ban | Restart Fail2Ban"
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted
        enabled: true
      become: true

    # ────────────────────────────────────────────────────────────────────────────
    # PHASE 6 – Final verification (including socket)
    # ────────────────────────────────────────────────────────────────────────────

    - name: "Phase 4 | Verify all tools and daemon socket"
      ansible.builtin.shell: |
        set -euo pipefail
        export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        FAILED=0

        check() {
          local label="$1"; shift
          local out
          if out=$("$@" 2>&1); then
            echo "✓ ${label}: ${out}"
          else
            echo "✗ ${label}: FAILED (command: $*)" >&2
            FAILED=1
          fi
        }

        check "node"        node --version
        check "npm"         npm  --version
        check "bun"         bun  --version
        check "go"          go   version
        check "caddy"       caddy version
        check "doppler"     doppler --version
        check "nextdeployd" nextdeployd --version

        # Verify socket exists and has correct permissions
        if [ -S "{{ socket_path }}" ]; then
          PERMS=$(stat -c '%a:%U:%G' "{{ socket_path }}")
          echo "✓ socket: {{ socket_path }} (${PERMS})"
        else
          echo "✗ socket: {{ socket_path }} not found or not a socket" >&2
          FAILED=1
        fi

        exit ${FAILED}
      args:
        executable: /bin/bash
      become: true
      register: verify_all
      changed_when: false

    - name: "Phase 4 | Installation summary"
      ansible.builtin.debug:
        msg: "{{ verify_all.stdout_lines }}"
